# Static bridge: ROS cmd_pos -> Gazebo cmd_vel (JointController only supports cmd_vel)
# Note: JointController with PID gains = position control despite "cmd_vel" naming

# Right hand
- ros_topic_name: /model/ftp_right_hand_nested/joint/right_index_1_joint/cmd_pos
